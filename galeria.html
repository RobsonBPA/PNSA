<!DOCTYPE html>
<html lang="PT-BR">
    
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="shortcut icon" href="images/global/LogoSite.jpg" type="image/png">
    <link rel="stylesheet" href="css/global/global.css">
    <link rel="stylesheet" href="css/pages/galeria/galeria.css">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.15.4/css/all.css">

    <title>Galeria | Paróquia</title>
</head>

<body>
  <!-- NAVBAR -->
  <div id="navbar-placeholder"></div>

  <!-- INÍCIO -->
  <main id="inicio-galeria" class="inicio inicio-galeria">
      <div class="container">
        <div class="inicio-content">
          <h1>Galeria</h1>
          <p>Reviva os momentos especiais da nossa comunidade.</p>
          <a href="#galeria" class="botao botao-primario">Ver galeria</a>
        </div>
      </div>
  </main>

  <!-- GALERIA -->
  <section id="galeria-section">
    <div class="container">
      <div class="galeria-grid" id="galeria"></div>
    </div>
  </section>
  
  <!-- GERAÇÃO DE CARDS -->
  <script>
    fetch('js/pages/galeria/galeria.json')
      .then(res => res.json())
      .then(data => {
        const grid = document.getElementById("galeria");

        data.forEach(item => {
          const card = `
            <a href="album.html?id=${item.id}" 
               class="card-galeria"
               style="background-image: url('${item.capa}')">
               
              <div class="overlay">
                <span class="data">${item.data}</span>
                <h3>${item.titulo}</h3>
              </div>
            </a>
          `;

          grid.innerHTML += card;
        });
      });

    // NAVBAR E FOOTER
    fetch('navbar.html')
      .then(res => res.text())
      .then(data => document.getElementById('navbar-placeholder').innerHTML = data);
    fetch('footer.html')
      .then(res => res.text())
      .then(data => document.getElementById('footer-placeholder').innerHTML = data);
  </script>
</body>

<div id="footer-placeholder"></div>
</html>
